<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <h2>Identificação do Usuário</h2>
  <form>
    <label for="nome">Nome*</label><br>
    <input type="text" id="nome" name="nome" required><br><br>

    <label for="senha">Senha*</label><br>
    <input type="password" id="senha" name="senha" required><br><br>

    <label for="cpf">CPF*</label><br>
    <input type="text" id="cpf" name="cpf" required><br><br>

    <label>Sexo*</label><br>
    <input type="radio" id="masculino" name="sexo" value="masculino" required>
    <label for="masculino">Masculino</label>
    <input type="radio" id="feminino" name="sexo" value="feminino">
    <label for="feminino">Feminino</label><br><br>

    <label for="data_nasc">Data Nascimento*</label><br>
    <input type="date" id="data_nasc" name="data_nasc" required><br><br>

    <label for="estado_civil">Estado Civil*</label><br>
    <input type="text" id="estado_civil" name="estado_civil" required><br><br>

    <label for="escolaridade">Escolaridade</label><br>
    <input type="text" id="escolaridade" name="escolaridade"><br><br>

    <label for="ocupacao">Ocupação Principal</label><br>
    <input type="text" id="ocupacao" name="ocupacao"><br><br>

    <label for="renda">Renda Mensal</label><br>
    <input type="number" id="renda" name="renda" step="0.01"><br><br>

    <label for="dependentes">Número de Dependentes</label><br>
    <input type="number" id="dependentes" name="dependentes"><br><br>

    <label for="telefone">Telefone*</label><br>
    <input type="tel" id="telefone" name="telefone" required><br><br>

    <label for="email">E-mail*</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <h2>Localização</h2>
    <label for="estado">Estado*</label><br>
    <input type="text" id="estado" name="estado" required><br><br>

    <label for="cidade">Cidade*</label><br>
    <input type="text" id="cidade" name="cidade" required><br><br>

    <h2>Mensagem do Usuário</h2>
    <label for="urgencia">Grau de Urgência</label><br>
    <select id="urgencia" name="urgencia">
      <option value="baixa">Baixa</option>
      <option value="media">Média</option>
      <option value="alta">Alta</option>
    </select><br><br>

    <label for="mensagem">Mensagem*</label><br>
    <textarea id="mensagem" name="mensagem" rows="5" cols="40" required></textarea><br><br>

    <label for="erro">Reportar Erro</label><br>
    <input type="file" id="erro" name="erro"><br><br>

    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
  </form>

  <p>*Preenchimento obrigatório</p>
</body>
</html>
